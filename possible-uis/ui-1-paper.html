<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>July 2026 Calendar UI Mockup</title>
  <style>
    :root {
      --page-bg: #f7f7f4;
      --paper: #ffffff;
      --ink: #101010;
      --muted: #545454;
      --line: #111111;
      --line-soft: #d9d9d9;
      --accent: #101010;
      --accent-soft: #f2f2f2;
      --today-bg: #111111;
      --today-ink: #ffffff;
      --shadow: none;
      --radius-card: 0;
      --radius-cell: 0;
      --radius-control: 0;
      --title-font: Georgia, "Times New Roman", Times, serif;
      --body-font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --cell-min: 4.8rem;
      --page-pad: clamp(0.875rem, 4vw, 1.4rem);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px) 0 0 / 1.35rem 1.35rem,
        linear-gradient(180deg, rgba(0, 0, 0, 0.018) 1px, transparent 1px) 0 0 / 1.35rem 1.35rem,
        var(--page-bg);
      font-family: var(--body-font);
    }

    button {
      color: inherit;
      font: inherit;
    }

    .shell {
      width: min(100%, 46rem);
      margin: 0 auto;
      padding: var(--page-pad);
    }

    .calendarCard {
      position: relative;
      width: 100%;
      min-width: 0;
      padding: clamp(0.85rem, 3.3vw, 1.2rem);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: clamp(0.85rem, 3vw, 1.15rem);
    }

    .iconButton {
      display: inline-grid;
      width: 2.55rem;
      height: 2.55rem;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: var(--paper);
      box-shadow: none;
      cursor: default;
    }

    .stickerGlyph {
      font-size: 1.35rem;
      line-height: 1;
    }

    .dots {
      display: grid;
      gap: 0.16rem;
      place-items: center;
    }

    .dots span {
      display: block;
      width: 0.27rem;
      height: 0.27rem;
      border-radius: 999px;
      background: var(--ink);
    }

    .monthTitle {
      margin: 0 0 clamp(0.9rem, 3vw, 1.25rem);
      font-family: var(--title-font);
      font-size: clamp(2rem, 10vw, 3.35rem);
      font-weight: 500;
      line-height: 0.98;
      letter-spacing: 0;
      text-align: center;
    }

    .viewToggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(100%, 17.5rem);
      margin: 0 auto clamp(1rem, 3.5vw, 1.35rem);
      padding: 0.18rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: var(--accent-soft);
    }

    .toggleButton {
      min-width: 0;
      padding: 0.48rem 0.62rem;
      border: 0;
      border-radius: calc(var(--radius-control) - 0.12rem);
      background: transparent;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      cursor: pointer;
    }

    .toggleButton[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper);
    }

    .weekdayHeader {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
      margin-bottom: 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: var(--paper);
    }

    .weekday {
      min-width: 0;
      padding: 0.45rem 0.2rem;
      border-right: 1px solid var(--line);
      color: var(--ink);
      font-size: clamp(0.62rem, 2.5vw, 0.78rem);
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
      text-transform: uppercase;
    }

    .weekday:last-child {
      border-right: 0;
    }

    .calendarScroller {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      overscroll-behavior: contain;
      scrollbar-width: thin;
    }

    .calendarGrid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-right: 0;
      border-bottom: 0;
      background: var(--line);
    }

    .dayCell {
      position: relative;
      min-width: 0;
      aspect-ratio: 1 / 1;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      border-radius: var(--radius-cell);
      background: var(--paper);
    }

    .dayCell.blank {
      background:
        repeating-linear-gradient(-45deg, transparent 0 0.42rem, rgba(0, 0, 0, 0.04) 0.42rem 0.48rem),
        var(--paper);
    }

    .dayNumber {
      position: absolute;
      top: 0.34rem;
      left: 0.38rem;
      display: grid;
      min-width: 1.45rem;
      height: 1.45rem;
      place-items: center;
      border-radius: 999px;
      color: var(--ink);
      font-size: clamp(0.72rem, 2.7vw, 0.9rem);
      font-weight: 800;
      line-height: 1;
    }

    .dayCell.today .dayNumber {
      background: var(--today-bg);
      color: var(--today-ink);
    }

    .calendarCard[data-view="close"] .calendarScroller {
      max-height: min(31rem, 68vh);
      overflow: auto;
      padding-right: 0.35rem;
      padding-bottom: 0.35rem;
    }

    .calendarCard[data-view="close"] .weekdayHeader,
    .calendarCard[data-view="close"] .calendarGrid {
      width: calc((100vw - (var(--page-pad) * 2) - 1.7rem) * 7 / 3);
      min-width: calc(var(--cell-min) * 7);
      max-width: 62rem;
    }

    .calendarCard[data-view="full"] .weekdayHeader,
    .calendarCard[data-view="full"] .calendarGrid {
      width: 100%;
      min-width: 0;
      max-width: none;
    }

    @media (min-width: 42rem) {
      .calendarCard[data-view="close"] .weekdayHeader,
      .calendarCard[data-view="close"] .calendarGrid {
        width: 58rem;
      }
    }

    @media (max-width: 22rem) {
      .toggleButton {
        font-size: 0.76rem;
        padding-inline: 0.35rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="calendarCard" data-view="close" aria-label="July 2026 calendar mockup">
      <div class="topBar">
        <button class="iconButton" type="button" aria-label="Sticker tray">
          <span class="stickerGlyph" aria-hidden="true">😛</span>
        </button>
        <button class="iconButton" type="button" aria-label="Menu">
          <span class="dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </button>
      </div>

      <h1 class="monthTitle">July 2026</h1>

      <div class="viewToggle" role="group" aria-label="Calendar view">
        <button class="toggleButton" type="button" data-view-target="close" aria-pressed="true">Close-up</button>
        <button class="toggleButton" type="button" data-view-target="full" aria-pressed="false">Full month</button>
      </div>

      <div class="calendarScroller">
        <div class="weekdayHeader" aria-hidden="true">
          <div class="weekday">Mon</div>
          <div class="weekday">Tue</div>
          <div class="weekday">Wed</div>
          <div class="weekday">Thu</div>
          <div class="weekday">Fri</div>
          <div class="weekday">Sat</div>
          <div class="weekday">Sun</div>
        </div>

        <div class="calendarGrid" role="grid" aria-label="July 2026, Monday start">
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell" role="gridcell" aria-label="Wednesday July 1"><span class="dayNumber">1</span></div>
          <div class="dayCell" role="gridcell" aria-label="Thursday July 2"><span class="dayNumber">2</span></div>
          <div class="dayCell" role="gridcell" aria-label="Friday July 3"><span class="dayNumber">3</span></div>
          <div class="dayCell" role="gridcell" aria-label="Saturday July 4"><span class="dayNumber">4</span></div>
          <div class="dayCell" role="gridcell" aria-label="Sunday July 5"><span class="dayNumber">5</span></div>
          <div class="dayCell" role="gridcell" aria-label="Monday July 6"><span class="dayNumber">6</span></div>
          <div class="dayCell today" role="gridcell" aria-label="Tuesday July 7, today"><span class="dayNumber">7</span></div>
          <div class="dayCell" role="gridcell" aria-label="Wednesday July 8"><span class="dayNumber">8</span></div>
          <div class="dayCell" role="gridcell" aria-label="Thursday July 9"><span class="dayNumber">9</span></div>
          <div class="dayCell" role="gridcell" aria-label="Friday July 10"><span class="dayNumber">10</span></div>
          <div class="dayCell" role="gridcell" aria-label="Saturday July 11"><span class="dayNumber">11</span></div>
          <div class="dayCell" role="gridcell" aria-label="Sunday July 12"><span class="dayNumber">12</span></div>
          <div class="dayCell" role="gridcell" aria-label="Monday July 13"><span class="dayNumber">13</span></div>
          <div class="dayCell" role="gridcell" aria-label="Tuesday July 14"><span class="dayNumber">14</span></div>
          <div class="dayCell" role="gridcell" aria-label="Wednesday July 15"><span class="dayNumber">15</span></div>
          <div class="dayCell" role="gridcell" aria-label="Thursday July 16"><span class="dayNumber">16</span></div>
          <div class="dayCell" role="gridcell" aria-label="Friday July 17"><span class="dayNumber">17</span></div>
          <div class="dayCell" role="gridcell" aria-label="Saturday July 18"><span class="dayNumber">18</span></div>
          <div class="dayCell" role="gridcell" aria-label="Sunday July 19"><span class="dayNumber">19</span></div>
          <div class="dayCell" role="gridcell" aria-label="Monday July 20"><span class="dayNumber">20</span></div>
          <div class="dayCell" role="gridcell" aria-label="Tuesday July 21"><span class="dayNumber">21</span></div>
          <div class="dayCell" role="gridcell" aria-label="Wednesday July 22"><span class="dayNumber">22</span></div>
          <div class="dayCell" role="gridcell" aria-label="Thursday July 23"><span class="dayNumber">23</span></div>
          <div class="dayCell" role="gridcell" aria-label="Friday July 24"><span class="dayNumber">24</span></div>
          <div class="dayCell" role="gridcell" aria-label="Saturday July 25"><span class="dayNumber">25</span></div>
          <div class="dayCell" role="gridcell" aria-label="Sunday July 26"><span class="dayNumber">26</span></div>
          <div class="dayCell" role="gridcell" aria-label="Monday July 27"><span class="dayNumber">27</span></div>
          <div class="dayCell" role="gridcell" aria-label="Tuesday July 28"><span class="dayNumber">28</span></div>
          <div class="dayCell" role="gridcell" aria-label="Wednesday July 29"><span class="dayNumber">29</span></div>
          <div class="dayCell" role="gridcell" aria-label="Thursday July 30"><span class="dayNumber">30</span></div>
          <div class="dayCell" role="gridcell" aria-label="Friday July 31"><span class="dayNumber">31</span></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
          <div class="dayCell blank" role="gridcell" aria-hidden="true"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const calendarCard = document.querySelector(".calendarCard");
    const toggleButtons = document.querySelectorAll("[data-view-target]");

    toggleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const view = button.dataset.viewTarget;
        calendarCard.dataset.view = view;

        toggleButtons.forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });
      });
    });
  </script>
</body>
</html>
